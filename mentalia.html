<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Mentalia · Web preview</title>
<style>
  :root{--coral:#f67255;--coral2:#f34453;--purple:#865fb7;--lav:#dbdbe9;--ink:#383b3f;--mut:#888a8d;--navmut:#b7b8ba;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#3a2a4a,#140e1c);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .scroll{flex:1;overflow:auto;}.scroll::-webkit-scrollbar{display:none;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 4px;}
  .topbar img{height:34px;}
  .topbar .signup{color:var(--coral2);font-size:16px;font-weight:600;}

  .coach{position:relative;margin:6px 18px 0;min-height:150px;}
  .bubble{background:var(--coral);color:#fff;border-radius:22px;padding:18px 20px 46px;max-width:250px;margin-left:auto;position:relative;box-shadow:0 14px 28px rgba(246,114,85,.3);}
  .bubble b{font-size:14px;font-weight:700;line-height:1.4;}
  .bubble::after{content:"";position:absolute;left:34px;bottom:-12px;border:13px solid transparent;border-top-color:var(--coral);border-bottom:0;}
  .coach .owl{position:absolute;left:6px;bottom:0;width:108px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.18));}

  .hi{font-size:20px;font-weight:700;color:var(--ink);padding:18px 18px 0;}
  .mood{display:flex;align-items:center;gap:12px;background:var(--lav);border-radius:12px;margin:14px 18px 0;padding:15px 16px;cursor:pointer;}
  .mood .em{font-size:26px;line-height:1;} .mood b{flex:1;font-size:16px;font-weight:700;color:var(--ink);} .mood .ch{color:#7d7e9c;font-size:20px;}

  .sec{font-size:22px;font-weight:700;color:var(--ink);padding:24px 18px 6px;}
  .recs{padding:4px 18px 16px;}
  .rec{display:flex;gap:14px;align-items:center;background:#fff;border-radius:16px;padding:10px;margin-bottom:12px;box-shadow:0 6px 18px rgba(60,40,60,.07);}
  .rec .thumb{width:78px;height:64px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:28px;}
  .rec .tx .lbl{font-size:12px;color:#383b3f;opacity:.8;} .rec .tx b{display:block;font-size:16px;font-weight:700;color:var(--ink);margin:2px 0;} .rec .tx p{font-size:14px;color:var(--mut);}

  .nav{flex:none;height:66px;border-top:1px solid #f0f0f0;display:flex;padding-bottom:6px;background:#fff;}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:inherit;font-size:12px;font-weight:600;color:var(--navmut);cursor:pointer;}
  .nav button.on{color:var(--coral);} .nav svg{width:22px;height:22px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="scroll">
    <div class="topbar"><img src="assets/mentalia/logo.png" alt="Mentalia"><span class="signup">Sign up</span></div>

    <div class="coach">
      <div class="bubble"><b>Tap to chat with your Virtual Coach</b></div>
      <img class="owl" src="assets/mentalia/owl.png" alt="">
    </div>

    <div class="hi">Good morning, Fiona</div>
    <div class="mood"><span class="em">🙂</span><b>How is your feeling ?</b><span class="ch">›</span></div>

    <div class="sec">Content recommendation</div>
    <div class="recs">
      <div class="rec"><div class="thumb" style="background:linear-gradient(135deg,#6f8cff,#3a4db0)">🧘</div><div class="tx"><div class="lbl">Video · 10 mins</div><b>7 Days of Calm</b><p>Lorem ipsum</p></div></div>
      <div class="rec"><div class="thumb" style="background:linear-gradient(135deg,#caa37a,#7a5a3c)">🎵</div><div class="tx"><div class="lbl">Playlist</div><b>Dreamy Celtic Harp</b><p>Curated by Calm</p></div></div>
      <div class="rec"><div class="thumb" style="background:linear-gradient(135deg,#7fd1b9,#2a9d8f)">🌬️</div><div class="tx"><div class="lbl">Meditation</div><b>Calming Anxiety</b><p>Curated by Calm</p></div></div>
    </div>
  </div>
  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Home</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Chat</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 5h11a2 2 0 0 1 2 2v12H6a2 2 0 0 1-2-2V5Z"/><path d="M9 9h5M9 13h5"/></svg>Resources</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.5-2-3.4-2.3 1a8 8 0 0 0-1.7-1l-.3-2.5H9.6l-.3 2.5a8 8 0 0 0-1.7 1l-2.3-1-2 3.4L3.3 11a7.8 7.8 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a8 8 0 0 0 1.7 1l.3 2.5h4.8l.3-2.5a8 8 0 0 0 1.7-1l2.3 1 2-3.4Z"/></svg>Setting</button>
  </nav>
</div></div>
</body></html>
