<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Mentalia · Web preview</title>
<style>
  :root{--coral:#f67255;--coral-d:#e85f42;--purple:#3d285e;--navy:#191970;--lilac:#ebe7f7;--ink:#383b3f;--mut:#9498a0;--line:#eee;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2433,#0a0a0e);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);position:relative;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .status{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 22px 0 26px;font-size:13px;font-weight:600;flex:none;}.status .r{display:flex;gap:5px;}
  .scroll{flex:1;overflow:auto;padding:4px 20px 14px;}.scroll::-webkit-scrollbar{display:none;}
  .logo{font-size:24px;margin:2px 0 6px;}
  .bubble{position:relative;background:var(--coral);color:#fff;border-radius:22px;padding:18px 20px;display:flex;align-items:center;gap:14px;margin:10px 0 22px;box-shadow:0 14px 30px rgba(246,114,85,.3);}
  .bubble b{flex:1;font-size:16px;font-weight:800;line-height:1.3;} .bubble .owl{font-size:42px;}
  .bubble::after{content:"";position:absolute;left:30px;bottom:-10px;border:12px solid transparent;border-top-color:var(--coral);border-bottom:0;}
  h1{font-size:21px;font-weight:800;margin-bottom:14px;}
  .feel{display:flex;align-items:center;gap:12px;background:var(--lilac);border:1px solid #d9d2ee;border-radius:16px;padding:15px 16px;cursor:pointer;margin-bottom:8px;}
  .feel .e{font-size:24px;} .feel b{flex:1;font-size:15px;font-weight:700;color:var(--purple);} .feel .chev{color:#9b8fc0;}
  .moods{display:flex;justify-content:space-between;gap:8px;margin:12px 0 22px;}
  .mood{flex:1;text-align:center;background:#f6f4fb;border:1px solid var(--line);border-radius:14px;padding:10px 4px;cursor:pointer;}
  .mood.on{background:var(--purple);color:#fff;border-color:transparent;} .mood .f{font-size:24px;} .mood small{font-size:10px;display:block;margin-top:3px;}
  .sect{background:#f7f7f9;margin:0 -20px;padding:18px 20px;border-radius:22px 22px 0 0;}
  .sh{font-size:17px;font-weight:800;margin-bottom:14px;}
  .rec{display:flex;gap:14px;background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 6px 18px rgba(60,40,90,.06);}
  .rec .th{width:74px;height:62px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:26px;}
  .rec .tx{flex:1;} .rec .tx small{color:var(--mut);font-size:12px;} .rec .tx b{display:block;font-size:14.5px;margin:3px 0;} .rec .tx .by{color:var(--mut);font-size:12px;}
  .nav{flex:none;height:64px;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:6px;}
  .nav button{flex:1;border:none;background:none;color:#bcbfc4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:600;font-family:inherit;cursor:pointer;}
  .nav button.on{color:var(--coral);} .nav svg{width:22px;height:22px;}
</style></head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="status"><span>9:41</span><span class="r">📶 🛜 🔋</span></div>
  <div class="scroll">
    <div class="logo">🦉</div>
    <div class="bubble"><b>Tap to chat with your Virtual Coach</b><span class="owl">🦉</span></div>
    <h1>Good morning, Fiona</h1>
    <div class="feel" id="feel"><span class="e">😊</span><b>How is your feeling ?</b><span class="chev">›</span></div>
    <div class="moods" id="moods"></div>
    <div class="sect">
      <div class="sh">Content recommendation</div>
      <div class="rec"><span class="th" style="background:linear-gradient(135deg,#bfe3ff,#7fb4e0)">🌊</span><div class="tx"><small>Video · 10 mins</small><b>7 Days of Calm</b><span class="by">Lorem ipsum</span></div></div>
      <div class="rec"><span class="th" style="background:linear-gradient(135deg,#e8c7e0,#b06fa0)">🎵</span><div class="tx"><small>Playlist</small><b>Dreamy Celtic Harp</b><span class="by">Curated by Calm</span></div></div>
      <div class="rec"><span class="th" style="background:linear-gradient(135deg,#ffe0b8,#f6a64f)">🧘</span><div class="tx"><small>Exercise · 5 mins</small><b>Box breathing</b><span class="by">Reduce stress fast</span></div></div>
    </div>
  </div>
  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Home</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Chat</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M4 4h12l4 4v12H4Z"/><path d="M14 4v5h5"/></svg>Resources</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.6 1.6 0 0 0 .3 1.8 2 2 0 1 1-2.8 2.8 1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0 1.6 1.6 0 0 0-2.7-1.1 2 2 0 1 1-2.8-2.8A1.6 1.6 0 0 0 4 13H3a2 2 0 1 1 0-4 1.6 1.6 0 0 0 1.7-2.7 2 2 0 1 1 2.8-2.8A1.6 1.6 0 0 0 10 4V3a2 2 0 1 1 4 0 1.6 1.6 0 0 0 2.7 1.1 2 2 0 1 1 2.8 2.8A1.6 1.6 0 0 0 20 9h1a2 2 0 1 1 0 4Z"/></svg>Setting</button>
  </nav>
</div></div>
<script>
  const moods=[['😣','Awful'],['😕','Bad'],['😐','Okay'],['🙂','Good'],['😄','Great']];
  document.getElementById('moods').innerHTML=moods.map((m,i)=>`<div class="mood ${i===2?'on':''}"><span class="f">${m[0]}</span><small>${m[1]}</small></div>`).join('');
  document.querySelectorAll('.mood').forEach(m=>m.onclick=()=>{document.querySelectorAll('.mood').forEach(x=>x.classList.remove('on'));m.classList.add('on');document.querySelector('#feel .e').textContent=m.querySelector('.f').textContent;});
</script></body></html>
