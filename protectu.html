<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>ProtectU · Web preview</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--card:#212121;--nav:#151515;--mut:#bababa;--red:#ff4d4f;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#1a1a1a,#000);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:#373739;border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:#fff;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  #map{position:absolute;inset:0;background:#373739;}
  .menu{position:absolute;top:46px;left:16px;z-index:500;width:44px;height:44px;border-radius:12px;background:#212121;display:flex;flex-direction:column;justify-content:center;gap:4px;padding:0 11px;cursor:pointer;}
  .menu i{height:2.4px;border-radius:2px;background:#ff4d4f;display:block;}
  .menu i:nth-child(2){width:60%;}
  .pinm{display:grid;place-items:center;width:40px;height:40px;border-radius:50%;background:#212121;border:2px solid #3a3a3a;font-size:18px;box-shadow:0 4px 10px rgba(0,0,0,.5);}
  .me{width:20px;height:20px;border-radius:50%;background:var(--red);border:3px solid #fff;box-shadow:0 0 0 8px rgba(255,77,79,.18);}
  .alert{position:absolute;left:14px;right:14px;bottom:78px;z-index:500;background:var(--card);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .alert .av{width:46px;height:46px;border-radius:50%;background:#3a3a3a;display:grid;place-items:center;font-size:22px;flex:none;}
  .alert .tx{flex:1;min-width:0;} .alert .tx .m{font-size:12px;color:#fff;opacity:.7;} .alert .tx b{display:block;font-size:16px;font-weight:600;margin:2px 0;} .alert .tx p{font-size:12px;color:#ff7a7a;}
  .alert .go{width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;display:grid;place-items:center;font-size:15px;flex:none;}
  .nav{flex:none;height:66px;background:var(--nav);border-top:1px solid #222;display:flex;align-items:center;padding-bottom:6px;position:relative;z-index:400;}
  .nav button{flex:1;border:none;background:none;color:#6a6a6a;display:grid;place-items:center;cursor:pointer;} .nav svg{width:23px;height:23px;}
  .nav .c{flex:none;width:60px;}
  .nav .c .t{width:56px;height:56px;border-radius:50%;margin-top:-24px;display:grid;place-items:center;background:linear-gradient(135deg,#ff4d4f,#b81d1f);box-shadow:0 8px 18px rgba(255,77,79,.45),0 0 0 5px #151515;}
  .nav .c .t svg{width:26px;height:26px;color:#fff;}
  .leaflet-control-attribution{font-size:8px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
<script>try{if((localStorage.getItem("theme")||"dark")==="light")document.documentElement.classList.add("lt")}catch(e){}</script>
<style>html.lt:not(.embed) body{background:radial-gradient(120% 80% at 50% 0%,#e7efdd,#bccdac)!important;}</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div id="map"></div>
  <div class="menu"><i></i><i></i><i></i></div>
  <div class="alert">
    <div class="av">🩹</div>
    <div class="tx"><div class="m">0.25 km · Il y a 5 min</div><b>Personne blessée</b><p>Je perds beaucoup de sang! AIDEZ MOI!</p></div>
    <div class="go">›</div>
  </div>
  <nav class="nav">
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg></button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 5h16v11H7l-3 3V5Z"/></svg></button>
    <div class="c"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg></div></div>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M18 9a6 6 0 0 0-12 0c0 6-2.5 7-2.5 7h17S18 15 18 9Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg></button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></button>
  </nav>
</div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var inc=[[48.8584,2.3470,'❓','#ff4d4f'],[48.8610,2.3500,'🔥','#ff8c2b'],[48.8560,2.3540,'🩸','#ff4d4f'],
           [48.8600,2.3560,'🔪','#cfcfcf'],[48.8548,2.3490,'👊','#ff8c2b'],[48.8590,2.3430,'⚠️','#ffd23a'],[48.8568,2.3585,'🚗','#ff8c2b']];
  if(window.L){
    var m=L.map('map',{zoomControl:false,attributionControl:true}).setView([48.8576,2.3510],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OSM, © CARTO'}).addTo(m);
    inc.forEach(function(p){L.marker([p[0],p[1]],{icon:L.divIcon({className:'',iconSize:[40,40],iconAnchor:[20,20],html:'<div class="pinm" style="border-color:'+p[3]+'">'+p[2]+'</div>'})}).addTo(m);});
    L.marker([48.8576,2.3510],{icon:L.divIcon({className:'',iconSize:[20,20],iconAnchor:[10,10],html:'<div class="me"></div>'})}).addTo(m);
    setTimeout(function(){m.invalidateSize();},80);
  }
</script>
</body></html>
