<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤫 secret room — Bow</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:#0a0f0a;color:#e9f3e6;min-height:100vh;display:grid;place-items:center;
    text-align:center;padding:30px;overflow:hidden;}
  .blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.45;animation:f 16s ease-in-out infinite;z-index:0;}
  .b1{width:480px;height:480px;background:#a3e635;top:-140px;left:-100px;}
  .b2{width:420px;height:420px;background:#2dd4bf;bottom:-120px;right:-100px;animation-delay:-7s;}
  @keyframes f{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
  .room{position:relative;z-index:1;max-width:560px;}
  .emoji{font-size:80px;animation:pop .6s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  h1{font-size:clamp(28px,6vw,46px);font-weight:800;letter-spacing:-1px;margin:10px 0 14px;
    background:linear-gradient(100deg,#bef264,#a3e635,#4ade80,#2dd4bf);-webkit-background-clip:text;background-clip:text;color:transparent;}
  p{color:#aebfa9;line-height:1.6;margin-bottom:12px;font-size:16px;}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px;}
  a.btn{display:inline-block;font-weight:600;padding:11px 20px;border-radius:11px;font-size:14px;}
  a.solid{color:#0a2009;background:linear-gradient(100deg,#bef264,#2dd4bf);}
  a.ghost{color:#e9f3e6;border:1px solid #26331d;}
  .small{font-size:12px;color:#728668;margin-top:26px;}
  canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}
</style>
</head>
<body>
<span class="blob b1"></span><span class="blob b2"></span>
<div class="room">
  <div class="emoji">🤫</div>
  <h1>You found the secret room</h1>
  <p>Not many people are this curious. I like that about you.</p>
  <p>If you're a recruiter who made it here — you clearly read the fine print. <strong>Let's talk.</strong> 😄</p>
  <div class="links">
    <a class="btn solid" href="mailto:nguyenvantuan4034@gmail.com">Say hi 👋</a>
    <a class="btn ghost" href="index.html">← Back to portfolio</a>
  </div>
  <div class="small">psst… there are more secrets on the main page. Try the Konami code. ✨</div>
</div>
<canvas id="cf"></canvas>
<script>
const c=document.getElementById('cf');c.width=innerWidth;c.height=innerHeight;const x=c.getContext('2d');
const cols=['#bef264','#a3e635','#4ade80','#2dd4bf','#22c55e','#fde047'];
const P=Array.from({length:160},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height*0.4,vx:(Math.random()-.5)*6,vy:3+Math.random()*5,s:5+Math.random()*7,r:Math.random()*6,vr:(Math.random()-.5)*.3,col:cols[(Math.random()*cols.length)|0]}));
let t=0;(function f(){t++;x.clearRect(0,0,c.width,c.height);P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.r+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.r);x.fillStyle=p.col;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);x.restore();});if(t<240)requestAnimationFrame(f);else c.remove();})();
</script>
</body>
</html>
