<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Swy'eat · Web preview</title>
<style>
  :root{--orange:#f06449;--ink:#101828;--mut:#667085;--line:#eef0f3;--tabmut:#98a2b3;--purple:#717ec3;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2220,#0a0807);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}

  .header{background:var(--orange);padding:14px 18px 0;flex:none;}
  .htop{display:flex;align-items:center;justify-content:space-between;}
  .htop img{height:30px;}
  .htop .ic{display:flex;gap:16px;color:#fff;}.htop .ic svg{width:21px;height:21px;}
  .tabs{display:flex;gap:26px;padding:14px 2px 0;}
  .tab{background:none;border:none;font-family:inherit;font-size:16px;font-weight:600;color:var(--tabmut);padding:10px 0;cursor:pointer;position:relative;}
  .tab.on{color:#fff;} .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:#fff;border-radius:3px;}

  .scroll{flex:1;overflow:auto;padding:12px 16px 14px;background:#fff;}.scroll::-webkit-scrollbar{display:none;}
  .resto{display:flex;gap:13px;padding:11px 4px;border-bottom:1px solid var(--line);position:relative;}
  .resto .ph{width:96px;height:96px;border-radius:16px;object-fit:cover;flex:none;}
  .ri{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
  .ri .top{font-size:11px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:4px;margin-bottom:3px;}
  .ri b{font-size:19px;font-weight:600;color:var(--ink);line-height:1.1;}
  .ri .cui{display:flex;align-items:center;gap:7px;margin-top:4px;}
  .ri .cui span{font-size:13px;color:var(--orange);} .ri .cui .e{display:flex;gap:3px;}
  .ri .cui .e i{width:16px;height:16px;border-radius:50%;border:1px solid #d7b6ad;color:var(--orange);font-style:normal;font-size:9px;display:grid;place-items:center;font-weight:700;}
  .ri .loc{font-size:13px;color:var(--mut);margin-top:4px;}
  .ri .rate{margin-top:7px;align-self:flex-start;display:inline-flex;align-items:center;gap:5px;background:#fff3ec;color:var(--orange);font-weight:600;font-size:14px;padding:5px 11px;border-radius:20px;}

  .nav{flex:none;height:78px;background:#fcfcfd;border-top:1px solid var(--line);display:flex;align-items:flex-start;padding:9px 0 6px;position:relative;}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-size:9px;font-weight:700;color:#344054;cursor:pointer;}
  .nav button.on{color:var(--orange);font-weight:800;} .nav svg{width:22px;height:22px;}
  .nav .fab{flex:none;width:56px;height:56px;border-radius:50%;background:var(--orange);color:#fff;border:none;display:grid;place-items:center;font-size:28px;margin:-22px 8px 0;box-shadow:0 10px 22px rgba(240,100,73,.45);cursor:pointer;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
<script>try{if((localStorage.getItem("theme")||"dark")==="light")document.documentElement.classList.add("lt")}catch(e){}</script>
<style>html.lt:not(.embed) body{background:radial-gradient(120% 80% at 50% 0%,#e7efdd,#bccdac)!important;}</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="header">
    <div class="htop">
      <img src="assets/swyeat/logo.png" alt="Swy'eat">
      <div class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 20s-7-4.3-7-9a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 4.7-7 9-7 9Z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M18 9a6 6 0 0 0-12 0c0 6-2.5 7-2.5 7h17S18 15 18 9Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      </div>
    </div>
    <div class="tabs"><button class="tab on">RESTAURANTS</button><button class="tab">CLIENTS</button></div>
  </div>

  <div class="scroll" id="list"></div>

  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>ACCUEIL</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg>CARTE</button>
    <button class="fab">＋</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>ÉVÉNEMENT</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>COMPTE</button>
  </nav>
</div></div>
<script>
  var r=[
   ['Le Coq en pot','Cuisine française','r1',0],
   ['Beijing Paradise','Cuisine asiatique','r2',0],
   ["Chick'n chips",'Cuisine anglaise','r3',1],
   ['Pizza Napoli','Cuisine Italienne','r4',0],
   ['Grills Beef & Beer','Cuisine asiatique','r6',0],
   ['Sakura Sushi','Cuisine japonaise','r1',0]];
  document.getElementById('list').innerHTML=r.map(function(x){return '<div class="resto"><img class="ph" src="assets/swyeat/'+x[2]+'.png" alt=""><div class="ri">'+(x[3]?'<div class="top">★ TOP DU TOP</div>':'')+'<b>'+x[0]+'</b><div class="cui"><span>'+x[1]+'</span><span class="e"><i>€</i><i>€</i></span></div><div class="loc">Paris, 75018</div><span class="rate">★ 4,5 (118 avis)</span></div></div>';}).join('');
</script>
</body></html>
