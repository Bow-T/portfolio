<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Social Club · Web preview</title>
<style>
  :root{--ink:#111;--mut:#8b8f95;--line:#eee;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2a2a,#0a0a0a);}
  .device{width:375px;max-width:100%;height:min(812px,94vh);background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);position:relative;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .status{height:42px;display:flex;align-items:center;justify-content:flex-end;padding:0 22px;font-size:13px;gap:5px;flex:none;}
  .scroll{flex:1;overflow:auto;}.scroll::-webkit-scrollbar{display:none;}
  .top{display:flex;gap:12px;padding:4px 16px 14px;}
  .rail{display:flex;flex-direction:column;gap:10px;}
  .rail .ci{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:20px;color:#fff;}
  .rail .ci.sel{box-shadow:0 0 0 2px #111,0 0 0 5px #fff;}
  .rail .add{border:1.5px solid var(--line);color:#111;}
  .banner{flex:1;height:120px;border-radius:18px;background:linear-gradient(120deg,#caa37a,#7a5a3c);position:relative;overflow:hidden;color:#fff;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;}
  .banner b{font-size:16px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.4);}
  .banner .acts{position:absolute;top:12px;right:12px;display:flex;gap:8px;} .banner .acts span{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.35);display:grid;place-items:center;font-size:13px;}
  .search{margin:2px 16px 8px;background:#f5f5f5;border-radius:12px;padding:12px 14px;color:var(--mut);font-size:14px;display:flex;gap:9px;align-items:center;}
  .sect{font-size:12px;color:var(--mut);font-weight:700;padding:14px 18px 6px;text-transform:capitalize;}
  .row{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;}
  .row:active{background:#fafafa;} .row .ic{width:24px;display:grid;place-items:center;color:#333;}
  .row b{flex:1;font-size:15px;font-weight:600;} .row .ct{color:var(--mut);font-size:13.5px;}
  .nav{flex:none;height:64px;border-top:1px solid var(--line);display:flex;padding-bottom:6px;}
  .nav button{flex:1;border:none;background:none;color:#b3b3b3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;}
  .nav button.on{color:#111;} .nav svg{width:22px;height:22px;}
  .nav .post .p{width:30px;height:30px;border-radius:50%;border:1.6px solid #111;display:grid;place-items:center;font-size:18px;}
</style></head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="status">📶 🛜 🔋</div>
  <div class="scroll">
    <div class="top">
      <div class="rail">
        <div class="ci sel" style="background:#5fb55f">🛍️</div>
        <div class="ci" style="background:#3a3a3a">🌱</div>
        <div class="ci add">⊞</div>
      </div>
      <div class="banner"><div class="acts"><span>↗</span><span>⋯</span></div><b>Kings of Shopify</b></div>
    </div>
    <div class="search">🔍 Search…</div>
    <div class="sect">Home</div>
    <div class="row"><span class="ic">💬</span><b>Discussions</b><span class="ct">28</span></div>
    <div class="row"><span class="ic">👥</span><b>Members</b><span class="ct">1.4K</span></div>
    <div class="row"><span class="ic">🏆</span><b>Leaderboard</b></div>
    <div class="sect">Activities</div>
    <div class="row"><span class="ic">📚</span><b>Classrooms</b><span class="ct">8</span></div>
    <div class="row"><span class="ic">📡</span><b>Livestreams</b><span class="ct">20</span></div>
    <div class="row"><span class="ic">🎉</span><b>Events</b><span class="ct">4</span></div>
    <div class="sect">More informations</div>
    <div class="row"><span class="ic">ℹ️</span><b>About community</b></div>
    <div class="row"><span class="ic">📞</span><b>Contact support</b></div>
    <div class="row"><span class="ic">❓</span><b>FAQs</b></div>
    <div class="row"><span class="ic">⭐</span><b>Become a creator</b></div>
    <div style="height:6px"></div>
  </div>
  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.4"/><circle cx="12" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="6" cy="12" r="2.4"/><circle cx="12" cy="12" r="2.4"/><circle cx="18" cy="12" r="2.4"/></svg>Home</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/></svg>Activities</button>
    <button class="post"><span class="p">＋</span></button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Messages</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Profile</button>
  </nav>
</div></div>
<script>document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));if(!b.classList.contains('post'))b.classList.add('on');}));</script>
</body></html>
