<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Social Club · Web preview</title>
<style>
  :root{--ink:#111;--mut:#8b8f95;--line:#eee;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2a2a,#0a0a0a);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .scroll{flex:1;overflow:auto;}.scroll::-webkit-scrollbar{display:none;}
  .top{display:flex;gap:12px;padding:14px 16px 12px;}
  .rail{display:flex;flex-direction:column;gap:10px;}
  .rail .ci{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;}
  .rail .ci.sel{box-shadow:0 0 0 2px #111,0 0 0 5px #fff;}
  .rail .add{background:#fff;border:1.5px solid var(--line);color:#111;font-size:22px;font-weight:400;}
  .banner{flex:1;height:120px;border-radius:18px;position:relative;overflow:hidden;color:#fff;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;
    background:linear-gradient(180deg,rgba(40,28,18,.15),rgba(30,20,12,.75)),linear-gradient(120deg,#b58a5e,#5a3d28);}
  .banner b{font-size:16px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.5);}
  .banner .acts{position:absolute;top:12px;right:12px;display:flex;gap:8px;} .banner .acts span{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);display:grid;place-items:center;font-size:13px;}
  .search{margin:2px 16px 10px;background:#f4f4f4;border-radius:12px;padding:12px 14px;color:var(--mut);font-size:14px;display:flex;gap:9px;align-items:center;}
  .search svg{width:16px;height:16px;}
  .sect{font-size:13px;color:var(--mut);font-weight:600;padding:12px 18px 4px;}
  .row{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;}
  .row:active{background:#fafafa;} .row .ic{width:24px;color:#333;display:grid;place-items:center;} .row .ic svg{width:21px;height:21px;}
  .row b{flex:1;font-size:15px;font-weight:500;} .row .ct{color:var(--mut);font-size:14px;}
  .nav{flex:none;height:64px;border-top:1px solid var(--line);display:flex;padding-bottom:6px;}
  .nav button{flex:1;border:none;background:none;color:#b3b3b3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;}
  .nav button.on{color:#111;} .nav svg{width:22px;height:22px;}
  .nav .post .p{width:30px;height:30px;border-radius:50%;border:1.6px solid #111;display:grid;place-items:center;font-size:18px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
<script>try{if((localStorage.getItem("theme")||"dark")==="light")document.documentElement.classList.add("lt")}catch(e){}</script>
<style>html.lt:not(.embed) body{background:radial-gradient(120% 80% at 50% 0%,#e7efdd,#bccdac)!important;}</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="scroll">
    <div class="top">
      <div class="rail">
        <div class="ci sel" style="background:#5fb55f">S</div>
        <div class="ci" style="background:#cdbb9a;color:#5a4a2e;font-size:12px">ECO</div>
        <div class="ci add">⊞</div>
      </div>
      <div class="banner"><div class="acts"><span>↗</span><span>⋯</span></div><b>Kings of Shopify</b></div>
    </div>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Search…</div>

    <div class="sect">Home</div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg></span><b>Discussions</b><span class="ct">28</span></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20a6 6 0 0 1 12 0M16 5.5a3 3 0 0 1 0 5.5M15 20a6 6 0 0 1 6 0"/></svg></span><b>Members</b><span class="ct">1.4K</span></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M6 4h12v4a6 6 0 0 1-12 0V4ZM4 5H2v1.5A3.5 3.5 0 0 0 5.5 10M20 5h2v1.5A3.5 3.5 0 0 1 18.5 10M9 16h6v4H9zM7 21h10"/></svg></span><b>Leaderboard</b></div>

    <div class="sect">Activities</div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M22 9 12 4 2 9l10 5 10-5Z"/><path d="M6 11v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg></span><b>Classrooms</b><span class="ct">8</span></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M6 7a8 8 0 0 0 0 10M18 7a8 8 0 0 1 0 10M3.5 4.5a12 12 0 0 0 0 15M20.5 4.5a12 12 0 0 1 0 15"/></svg></span><b>Livestreams</b><span class="ct">20</span></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span><b>Events</b><span class="ct">4</span></div>

    <div class="sect">More informations</div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01" stroke-linecap="round"/></svg></span><b>About community</b></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg></span><b>Contact support</b></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4 2c0 1.5-2 2-2 3M12 17h.01"/></svg></span><b>FAQs</b></div>
    <div class="row"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="m12 3 2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5Z"/></svg></span><b>Become a creator</b></div>
    <div style="height:8px"></div>
  </div>
  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.4"/><circle cx="12" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="6" cy="12" r="2.4"/><circle cx="12" cy="12" r="2.4"/><circle cx="18" cy="12" r="2.4"/></svg>Home</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/></svg>Activities</button>
    <button class="post"><span class="p">＋</span></button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Messages</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Profile</button>
  </nav>
</div></div>
</body></html>
