<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>LetShare · Web preview</title>
<style>
  :root{--gold:#bda652;--card:#cdbd77;--ink:#0f172a;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2418,#0a0805);}
  .device{aspect-ratio:393/852;height:min(852px,94vh);width:auto;max-width:94vw;background:#000;border-radius:46px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;display:flex;flex-direction:column;color:#fff;}
  .screen .bg{position:absolute;inset:0;background:url(assets/letshare/bg.jpg) center/cover no-repeat;}
  .screen::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15),transparent 30%,transparent 55%,rgba(20,14,6,.35));}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}

  .body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 18px;}
  .cards{display:flex;gap:16px;margin-bottom:22px;}
  .lc{flex:1;background:var(--card);border-radius:22px;padding:18px;min-height:172px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 34px rgba(0,0,0,.3);cursor:pointer;}
  .lc .orb{width:54px;height:54px;border-radius:50%;align-self:center;
    background:radial-gradient(circle at 38% 34%,#ffffff,#fff6cf 40%,#e7c766 75%,#caa23a);
    box-shadow:0 0 22px rgba(255,236,160,.9),inset 0 -6px 12px rgba(180,140,40,.4);}
  .lc b{font-size:23px;font-weight:800;color:var(--ink);line-height:1.1;}

  .nav{position:relative;z-index:2;flex:none;height:74px;display:flex;align-items:flex-start;padding:10px 0 6px;
    background:linear-gradient(180deg,transparent,rgba(20,14,6,.4));}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit;font-size:12px;font-weight:600;color:#fff;cursor:pointer;text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .nav button.on{color:var(--gold);} .nav svg{width:23px;height:23px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head><body>
<div class="device"><div class="screen"><div class="bg"></div><div class="notch"></div>
  <div class="body">
    <div class="cards">
      <div class="lc"><span class="orb"></span><b>Create a<br>project</b></div>
      <div class="lc"><span class="orb"></span><b>Discovery project</b></div>
    </div>
  </div>
  <nav class="nav">
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Profile</button>
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5-5 2 2-5 5-2Z"/></svg>Discovery</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Chats</button>
  </nav>
</div></div>
</body></html>
