<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Octopus · Web preview</title>
<style>
  :root{--bg:#34395b;--tile:#3c4166;--tileb:rgba(255,255,255,.06);--txt:#e9ebf3;--mut:#a1a6bd;--or:#ff6b30;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;
    display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#262a47,#0a0b14);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;
    box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--txt);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .scroll{flex:1;overflow:auto;padding-top:30px;}.scroll::-webkit-scrollbar{display:none;}

  .top{display:flex;align-items:center;gap:14px;padding:6px 20px 14px;}
  .search{flex:1;background:#fff;border-radius:14px;height:46px;display:flex;align-items:center;gap:10px;padding:0 16px;color:#a7a7a7;font-size:15px;}
  .search svg{width:19px;height:19px;color:#9aa0a6;}
  .bell{position:relative;color:#fff;flex:none;}
  .bell svg{width:25px;height:25px;}
  .bell .dot{position:absolute;top:-1px;right:0;width:9px;height:9px;border-radius:50%;background:#ff4d4f;border:2px solid var(--bg);}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 20px;}
  .tile{background:var(--tile);border:1px solid var(--tileb);border-radius:18px;padding:13px 4px 9px;
    display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:transform .12s;}
  .tile:active{transform:scale(.95);}
  .tile img{height:36px;width:auto;object-fit:contain;}
  .tile span{font-size:10.5px;font-weight:500;color:#fff;text-align:center;line-height:1.18;}

  .sect{font-size:12px;font-weight:600;color:var(--txt);letter-spacing:.04em;text-transform:uppercase;padding:0 20px;margin:20px 0 12px;}
  .sect-row{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin:22px 0 12px;}
  .sect-row .t{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--txt);}
  .sect-row .more{font-size:12px;font-weight:500;color:var(--or);cursor:pointer;}

  .pay{display:flex;gap:12px;padding:0 20px;}
  .pay img{width:calc(50% - 6px);height:auto;border-radius:14px;display:block;}

  .vouchers{display:flex;gap:12px;padding:0 20px 2px;overflow-x:auto;}.vouchers::-webkit-scrollbar{display:none;}
  .vouchers img{height:132px;width:auto;border-radius:16px;flex:none;display:block;}

  .deals{display:flex;gap:12px;padding:0 20px 6px;overflow-x:auto;}.deals::-webkit-scrollbar{display:none;}
  .deal{flex:none;width:150px;background:var(--tile);border:1px solid var(--tileb);border-radius:16px;overflow:hidden;cursor:pointer;}
  .deal .thumb{height:92px;display:grid;place-items:center;position:relative;}
  .deal .thumb img{height:52px;}
  .deal .off{position:absolute;top:8px;left:8px;background:#ff4d4f;color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:8px;}
  .deal .di{padding:9px 11px 11px;} .deal .di b{font-size:12.5px;font-weight:600;display:block;}
  .deal .di .p{margin-top:4px;font-size:12px;} .deal .di .p b{display:inline;color:var(--or);} .deal .di .p s{color:var(--mut);font-size:11px;margin-left:5px;}

  .nav{flex:none;height:64px;background:#2f3352;border-top:1px solid rgba(255,255,255,.06);display:flex;padding-bottom:4px;}
  .nav button{flex:1;border:none;background:none;color:var(--mut);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;}
  .nav button.on{color:var(--txt);}
  .nav svg{width:23px;height:23px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head>
<body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="scroll">

    <div class="top">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        Search...
      </div>
      <div class="bell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M18 9a6 6 0 0 0-12 0c0 6-2.5 7-2.5 7h17S18 15 18 9Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
        <span class="dot"></span>
      </div>
    </div>

    <div class="grid">
      <div class="tile"><img src="assets/octopus/ic_driver.png" alt=""><span>Octopus Driver</span></div>
      <div class="tile"><img src="assets/octopus/ic_express.png" alt=""><span>Express Delivery</span></div>
      <div class="tile"><img src="assets/octopus/ic_hightech.png" alt=""><span>High-Tech</span></div>
      <div class="tile"><img src="assets/octopus/ic_flowers.png" alt=""><span>Flowers</span></div>
      <div class="tile"><img src="assets/octopus/ic_pharmacy.png" alt=""><span>Pharmacy</span></div>
      <div class="tile"><img src="assets/octopus/ic_luxury.png" alt=""><span>Luxury</span></div>
      <div class="tile"><img src="assets/octopus/ic_homeserv.png" alt=""><span>Home Services</span></div>
      <div class="tile"><img src="assets/octopus/ic_deals.png" alt=""><span>Special Deals</span></div>
    </div>

    <div class="sect">Special Deals</div>
    <div class="pay">
      <img src="assets/octopus/card_bank.png" alt="Bank account">
      <img src="assets/octopus/card_wallet.png" alt="Octopus wallet">
    </div>

    <div class="sect">Just for you</div>
    <div class="vouchers">
      <img src="assets/octopus/voucher1.png" alt="8% Off & Free Delivery">
      <img src="assets/octopus/voucher2.png" alt="8% Off & Free Delivery">
    </div>

    <div class="sect-row"><span class="t">Special Deals</span><span class="more">See more ›</span></div>
    <div class="deals">
      <div class="deal"><div class="thumb" style="background:linear-gradient(150deg,#ffb45c,#f0664a)"><span class="off">-15%</span><img src="assets/octopus/ic_luxury.png" alt=""></div>
        <div class="di"><b>Leather handbag</b><div class="p"><b>72 €</b><s>85 €</s></div></div></div>
      <div class="deal"><div class="thumb" style="background:linear-gradient(150deg,#7d8cff,#3d4bb0)"><span class="off">-20%</span><img src="assets/octopus/ic_hightech.png" alt=""></div>
        <div class="di"><b>Smart speaker</b><div class="p"><b>40 €</b><s>50 €</s></div></div></div>
      <div class="deal"><div class="thumb" style="background:linear-gradient(150deg,#5fd39a,#2a9d6e)"><span class="off">-10%</span><img src="assets/octopus/ic_flowers.png" alt=""></div>
        <div class="di"><b>Bouquet du jour</b><div class="p"><b>18 €</b><s>20 €</s></div></div></div>
    </div>
    <div style="height:8px"></div>

  </div>

  <nav class="nav">
    <button class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Home</button>
    <button>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Order history</button>
    <button>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.9A8.4 8.4 0 1 1 21 11.5Z"/></svg>Messages</button>
    <button>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Account</button>
  </nav>
</div></div>
<script>
  document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  }));
</script>
</body>
</html>
