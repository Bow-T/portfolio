<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Nila Sphere · Web preview</title>
<style>
  :root{--orange:#f26030;--peach:#ffe8e2;--peach2:#ffd3c7;--navy:#132290;--bg:#f0f5ff;--ink:#333;--mut:#868686;--red:#f63e50;--alert:#ffc6cc;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#22305a,#0a0e1c);}
  .device{aspect-ratio:393/852;height:min(852px,94vh);width:auto;max-width:94vw;background:#000;border-radius:46px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .scroll{flex:1;overflow:auto;display:flex;flex-direction:column;}.scroll::-webkit-scrollbar{display:none;}

  .header{background:var(--orange);padding:18px 18px 58px;color:#fff;flex:none;}
  .htop{display:flex;align-items:center;}
  .back{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:22px;flex:none;}
  .header h1{flex:1;text-align:center;font-size:18px;font-weight:600;margin-right:40px;}

  .plat{background:var(--peach);border-radius:22px;margin:-40px 16px 0;padding:42px 18px 18px;position:relative;}
  .plat .cloche{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:64px;height:64px;filter:drop-shadow(0 6px 12px rgba(220,90,40,.25));}
  .plat b{display:block;text-align:center;font-size:18px;font-weight:600;color:var(--ink);}
  .plat p{text-align:center;font-size:14px;color:var(--mut);margin-top:5px;}
  .dash{border:none;border-top:1.5px dashed #f1bfb2;margin:14px 0;}
  .input{background:#f5f5f5;border:1px solid #ececec;border-radius:14px;padding:15px 16px;color:#999;font-size:14px;}

  .co2{background:#fff;border-radius:22px;margin:16px 16px 0;padding:18px;box-shadow:0 8px 22px rgba(60,70,120,.06);}
  .co2 .row{display:flex;justify-content:space-between;align-items:baseline;}
  .co2 .row b{font-size:14px;font-weight:600;color:#000;} .co2 .row span{font-size:14px;color:var(--mut);}
  .dash2{border:none;border-top:1.5px dashed #d7e0f7;margin:12px 0 0;}
  .gwrap{position:relative;display:grid;place-items:center;padding:10px 0 4px;}
  .gauge{width:210px;height:210px;}
  .gcenter{position:absolute;text-align:center;}
  .gcenter .v{font-size:40px;font-weight:700;color:var(--red);line-height:1;}
  .gcenter .u{font-size:14px;color:#000;margin-top:2px;}
  .mascot{position:absolute;right:4px;bottom:2px;width:92px;}

  .alert{display:flex;align-items:center;gap:10px;background:var(--alert);border-left:5px solid var(--red);border-radius:12px;margin:16px;padding:13px 16px;}
  .alert p{font-size:14px;color:var(--ink);line-height:1.4;}
  .save{margin:auto 16px 18px;background:var(--navy);color:#fff;border:none;border-radius:30px;padding:16px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 12px 26px rgba(19,34,144,.35);}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="scroll">
    <div class="header">
      <div class="htop"><div class="back">‹</div><h1>Estimation</h1></div>
    </div>

    <div class="plat">
      <img class="cloche" src="assets/nila/cloche.png" alt="">
      <b>Plat végétarien</b>
      <p>Plat sans viande, pour une personne</p>
      <hr class="dash">
      <div class="input">Entrer la quantité</div>
    </div>

    <div class="co2">
      <div class="row"><b>CO2 équivalent estimé</b><span>Kg CO2</span></div>
      <hr class="dash2">
      <div class="gwrap">
        <svg class="gauge" viewBox="0 0 220 220">
          <defs><linearGradient id="ng" x1="0.05" y1="0.5" x2="0.95" y2="0.5">
            <stop offset="0" stop-color="#6b3def"/><stop offset=".45" stop-color="#e742eb"/><stop offset="1" stop-color="#fb9a2b"/></linearGradient></defs>
          <circle cx="110" cy="110" r="93" fill="none" stroke="#f1eef8" stroke-width="15"/>
          <circle cx="110" cy="110" r="93" fill="none" stroke="url(#ng)" stroke-width="15" stroke-linecap="round"
            stroke-dasharray="540 585" transform="rotate(-108 110 110)"/>
          <circle cx="163" cy="42" r="9" fill="#fff" stroke="#f3c9ef" stroke-width="3"/>
        </svg>
        <div class="gcenter"><div class="v">450</div><div class="u">Kg CO2</div></div>
        <img class="mascot" src="assets/nila/mascot.png" alt="">
      </div>
    </div>

    <div class="alert"><p>Votre consommation de CO2 a dépassé le seuil recommandé</p></div>

    <button class="save">Sauvegarder</button>
  </div>
</div></div>
</body></html>
