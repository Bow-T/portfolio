<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Nila · Web preview</title>
<style>
  :root{--orange:#e46c25;--orange2:#f08a3e;--navy:#2d2d8c;--indigo:#4545d5;--mint:#abf5b7;--cream:#fdf3e9;
    --pink:#fde3da;--red:#ef4d6a;--ink:#292d32;--mut:#9a9aa5;--line:#ececf4;--bg:#eef0fb;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;
    display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2a3a,#0a0a12);}
  .device{aspect-ratio:393/852;height:min(852px,94vh);width:auto;max-width:94vw;background:#000;border-radius:46px;padding:11px;
    box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .head{background:var(--orange);color:#fff;padding:46px 20px 50px;border-radius:0 0 28px 28px;position:relative;z-index:1;}
  .head .nav{display:flex;align-items:center;justify-content:center;position:relative;}
  .head .back{position:absolute;left:0;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;color:#fff;}
  .head h1{font-size:18px;font-weight:800;}
  .chips{display:flex;gap:8px;margin-top:16px;overflow:auto;} .chips::-webkit-scrollbar{display:none;}
  .chip{flex:none;background:rgba(255,255,255,.18);border:none;color:#fff;font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:20px;cursor:pointer;}
  .chip.on{background:#fff;color:var(--orange);}
  .scroll{flex:1;overflow:auto;margin-top:-30px;padding:0 18px 16px;position:relative;z-index:2;} .scroll::-webkit-scrollbar{display:none;}
  .card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 12px 30px rgba(80,60,40,.08);}
  .dish{background:var(--pink);text-align:center;padding-top:34px;margin-bottom:16px;position:relative;}
  .dish .ic{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:48px;height:48px;border-radius:50%;background:var(--orange2);display:grid;place-items:center;font-size:22px;box-shadow:0 8px 18px rgba(228,108,37,.3);}
  .dish h2{font-size:18px;font-weight:800;} .dish p{color:var(--mut);font-size:13px;margin:4px 0 14px;}
  .dish .dash{border-top:1.5px dashed #f3c4b5;margin:0 -4px 14px;}
  .dish input{width:100%;background:#faf7f6;border:1px solid #f0ded6;border-radius:12px;padding:13px 15px;font-size:14px;color:var(--ink);font-family:inherit;outline:none;}
  .co2{margin-bottom:16px;position:relative;overflow:hidden;}
  .co2 .top{display:flex;justify-content:space-between;align-items:center;}
  .co2 .top b{font-size:15px;font-weight:800;} .co2 .top small{color:var(--mut);font-size:13px;}
  .co2 .dash{border-top:1.5px dashed #d9d9ef;margin:14px -4px;}
  .gauge{position:relative;display:grid;place-items:center;padding:6px 0;}
  .gauge .val{position:absolute;text-align:center;} .gauge .val b{font-size:44px;font-weight:900;color:var(--red);line-height:1;} .gauge .val small{font-size:14px;color:var(--ink);}
  .mascot{position:absolute;right:6px;bottom:0;font-size:46px;}
  .warn{background:#fde1e6;border-left:4px solid var(--red);border-radius:10px;padding:13px 15px;color:#c2334c;font-size:13px;line-height:1.4;margin-bottom:18px;font-weight:600;}
  .save{width:100%;border:none;border-radius:16px;padding:16px;font-weight:800;font-size:15px;color:#fff;background:var(--navy);cursor:pointer;box-shadow:0 12px 26px rgba(45,45,140,.32);}
  .nav-bottom{flex:none;height:64px;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:6px;}
  .nav-bottom button{flex:1;border:none;background:none;color:#b6b6c4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:700;font-family:inherit;cursor:pointer;}
  .nav-bottom button.on{color:var(--orange);} .nav-bottom svg{width:22px;height:22px;}
</style>
</head>
<body>
<div class="device"><div class="screen">
  <div class="notch"></div>
  <div class="head">
    <div class="nav"><span class="back">←</span><h1>Estimation</h1></div>
    <div class="chips">
      <button class="chip on" data-c="Food">🍽️ Food</button>
      <button class="chip" data-c="Purchase">🛍️ Purchase</button>
      <button class="chip" data-c="Activities">🎯 Activities</button>
      <button class="chip" data-c="Transport">🚗 Transport</button>
    </div>
  </div>

  <div class="scroll">
    <div class="card dish">
      <span class="ic" id="dish-ic">🍲</span>
      <h2 id="dish-t">Plat végétarien</h2>
      <p id="dish-s">Plat sans viande, pour une personne</p>
      <div class="dash"></div>
      <input placeholder="Entrer la quantité" value="1">
    </div>

    <div class="card co2">
      <div class="top"><b>CO2 équivalent estimé</b><small>Kg CO2</small></div>
      <div class="dash"></div>
      <div class="gauge">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <defs><linearGradient id="g" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#7c4dd6"/><stop offset=".5" stop-color="#c95b8e"/><stop offset="1" stop-color="#f08a3e"/></linearGradient></defs>
          <circle cx="110" cy="110" r="92" fill="none" stroke="#eee" stroke-width="14"/>
          <circle id="arc" cx="110" cy="110" r="92" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round"
            transform="rotate(-90 110 110)" stroke-dasharray="578" stroke-dashoffset="578"/>
        </svg>
        <div class="val"><b id="co2v">0</b><br><small>Kg CO2</small></div>
        <span class="mascot">🐤</span>
      </div>
    </div>

    <div class="warn" id="warn">Votre consommation de CO2 a dépassé le seuil recommandé</div>
    <button class="save">Sauvegarder</button>
    <div style="height:10px"></div>
  </div>

  <nav class="nav-bottom">
    <button class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M12 3 2 9v12h7v-7h6v7h7V9L12 3Z"/></svg>Estimate</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M4 4h16v13H7l-3 3V4Z"/></svg>Blog</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 19V10M10 19V5M16 19v-7M22 19H2"/></svg>Stats</button>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Profile</button>
  </nav>
</div></div>

<script>
  const data={
    Food:['🍲','Plat végétarien','Plat sans viande, pour une personne',450,'Votre consommation de CO2 a dépassé le seuil recommandé'],
    Purchase:['🛍️','Vêtement neuf','Un t-shirt en coton',180,'Pensez à acheter d’occasion pour réduire votre impact'],
    Activities:['🎯','Streaming vidéo','2 heures en HD',95,'Baissez la qualité pour économiser du CO2'],
    Transport:['🚗','Trajet en voiture','25 km en ville',320,'Le covoiturage diviserait vos émissions'],
  };
  const C=578;
  function animate(to){ const arc=document.getElementById('arc'), v=document.getElementById('co2v');
    const pct=Math.min(to/600,1); const target=C-C*pct; arc.style.transition='stroke-dashoffset 1s ease';
    requestAnimationFrame(()=>arc.style.strokeDashoffset=target);
    let n=0; clearInterval(window._t); window._t=setInterval(()=>{ n+=Math.ceil((to-n)/8); if(n>=to){n=to;clearInterval(window._t);} v.textContent=n; },30);
  }
  function set(c){ const d=data[c];
    document.getElementById('dish-ic').textContent=d[0];
    document.getElementById('dish-t').textContent=d[1];
    document.getElementById('dish-s').textContent=d[2];
    document.getElementById('warn').textContent=d[4];
    document.getElementById('arc').style.strokeDashoffset=C; document.getElementById('co2v').textContent='0';
    setTimeout(()=>animate(d[3]),60);
  }
  document.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===b)); set(b.dataset.c);
  }));
  document.querySelectorAll('.nav-bottom button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-bottom button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  }));
  set('Food');
</script>
</body>
</html>
