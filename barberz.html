<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Barber'Z · Web preview</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--ink:#222426;--bg:#33363a;--lav:#a39ed6;--lav-d:#7d77c2;--card:#fff;--mut:#8b8f95;--line:#ececf4;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2833,#0a0a0e);}
  .device{width:375px;max-width:100%;height:min(812px,94vh);background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:#fff;position:relative;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  #map{position:absolute;inset:0;background:#2b2e33;}
  .topbar{position:absolute;top:44px;left:14px;right:14px;z-index:500;display:flex;gap:10px;align-items:center;}
  .loc{flex:1;background:rgba(20,20,26,.86);backdrop-filter:blur(6px);border-radius:30px;padding:11px 16px;display:flex;align-items:center;gap:9px;}
  .loc b{font-size:14px;} .loc small{color:var(--lav);font-size:11px;display:block;}
  .topbar .rb{width:44px;height:44px;border-radius:50%;background:rgba(20,20,26,.86);display:grid;place-items:center;color:#fff;flex:none;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:500;background:#fff;color:var(--ink);border-radius:24px 24px 0 0;padding:14px 16px 18px;box-shadow:0 -10px 30px rgba(0,0,0,.3);}
  .grip{width:42px;height:5px;border-radius:3px;background:#dadada;margin:0 auto 12px;}
  .sheet h3{font-size:15px;font-weight:800;margin-bottom:12px;} .sheet h3 span{color:var(--lav-d);}
  .bcards{display:flex;gap:12px;overflow:auto;padding-bottom:4px;}.bcards::-webkit-scrollbar{display:none;}
  .bcard{flex:none;width:210px;border:1px solid var(--line);border-radius:16px;padding:12px;}
  .bcard .bh{display:flex;gap:10px;align-items:center;}
  .bcard .bi{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--lav),var(--lav-d));display:grid;place-items:center;font-size:20px;flex:none;}
  .bcard b{font-size:14px;} .bcard small{color:var(--mut);font-size:11.5px;}
  .bcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
  .bcard .price{font-weight:800;color:var(--lav-d);} .bcard .book{background:var(--lav-d);color:#fff;border:none;border-radius:18px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;}
  .pinlabel{background:var(--lav-d);color:#fff;font-weight:800;font-size:11px;padding:3px 8px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.3);white-space:nowrap;border:2px solid #fff;}
  .leaflet-control-attribution{font-size:8px;}
</style></head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div id="map"></div>
  <div class="topbar">
    <div class="loc"><span>📍</span><div><small>Your location</small><b>Brooklyn, NY</b></div></div>
    <div class="rb">🔍</div><div class="rb">☰</div>
  </div>
  <div class="sheet">
    <div class="grip"></div>
    <h3>Barbers near you <span>· 8 open</span></h3>
    <div class="bcards" id="bcards"></div>
  </div>
</div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const barbers=[['Fade Masters','★ 4.9 · 0.4 km','25€','💈',40.690,-73.962],['The Sharp Cut','★ 4.8 · 0.7 km','20€','✂️',40.686,-73.95],['Gentlemen\'s Club','★ 4.7 · 1.1 km','30€','🪒',40.694,-73.945],['Urban Blends','★ 4.9 · 1.4 km','22€','💈',40.682,-73.97]];
  document.getElementById('bcards').innerHTML=barbers.map(b=>`<div class="bcard"><div class="bh"><span class="bi">${b[3]}</span><div><b>${b[0]}</b><br><small>${b[1]}</small></div></div><div class="meta"><span class="price">${b[2]}</span><button class="book">Book</button></div></div>`).join('');
  if(window.L){
    const m=L.map('map',{zoomControl:false,attributionControl:true}).setView([40.688,-73.957],14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OSM, © CARTO'}).addTo(m);
    barbers.forEach(b=>L.marker([b[4],b[5]],{icon:L.divIcon({className:'',iconSize:[44,22],iconAnchor:[22,11],html:'<div class="pinlabel">'+b[2]+'</div>'})}).addTo(m).bindPopup(b[0]));
    L.marker([40.688,-73.957],{icon:L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],html:'<div style="width:14px;height:14px;border-radius:50%;background:#a39ed6;border:3px solid #fff;box-shadow:0 0 0 4px rgba(163,158,214,.3)"></div>'})}).addTo(m);
    setTimeout(()=>m.invalidateSize(),80);
  }
</script></body></html>
