<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Barber'Z · Web preview</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--ink:#383b3f;--pink:#f3b8c6;--lav:#a39ed6;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2833,#0a0a0e);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{position:relative;width:100%;height:100%;background:#e8e6ea;border-radius:34px;overflow:hidden;display:flex;flex-direction:column;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  #map{position:absolute;inset:0;}
  .topbar{position:absolute;top:44px;left:14px;right:14px;z-index:600;display:flex;gap:10px;align-items:center;}
  .search{flex:1;background:#fff;border-radius:14px;height:46px;display:flex;align-items:center;gap:10px;padding:0 15px;box-shadow:0 6px 18px rgba(0,0,0,.12);color:#9aa0a6;font-size:15px;}
  .search svg{width:19px;height:19px;}
  .search b{color:#4d4d4d;font-weight:600;}
  .topbar .rb{width:46px;height:46px;border-radius:14px;background:#fff;display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,0,0,.12);color:#4d4d4d;}
  .topbar .rb svg{width:20px;height:20px;}
  .locbtn{position:absolute;left:14px;top:104px;z-index:600;display:flex;align-items:center;gap:7px;background:#fff;border-radius:24px;padding:8px 14px;box-shadow:0 6px 16px rgba(0,0,0,.12);font-size:13px;font-weight:600;color:#4d4d4d;}
  .locbtn svg{width:16px;height:16px;color:var(--lav);}
  .bpin{display:flex;flex-direction:column;align-items:center;}
  .bpin .ph{width:38px;height:38px;border-radius:50%;border:3px solid var(--pink);object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,.25);background:#fff;}
  .bpin .lb{margin-top:4px;background:#fff;color:var(--ink);font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,.18);}
  .leaflet-control-attribution{font-size:8px;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div id="map"></div>
  <div class="topbar">
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><b>Barber</b></div>
    <div class="rb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
  </div>
  <div class="locbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>Location</div>
</div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var pins=[['Lorem ipsum',40.700,-73.962],['Kylie Smith',40.694,-73.952],['Jonathan K',40.691,-73.944],
    ['Roberta\'s',40.688,-73.958],['ABCDEF',40.685,-73.946],['Maria Hernandez',40.683,-73.939],
    ['Nice hair salon',40.679,-73.951],['Hair lust',40.675,-73.96]];
  if(window.L){
    var m=L.map('map',{zoomControl:false,attributionControl:true}).setView([40.689,-73.951],14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OSM, © CARTO'}).addTo(m);
    pins.forEach(function(p){
      L.marker([p[1],p[2]],{icon:L.divIcon({className:'',iconSize:[80,58],iconAnchor:[40,52],
        html:'<div class="bpin"><img class="ph" src="assets/barberz/b1.png" alt=""><span class="lb">'+p[0]+'</span></div>'})}).addTo(m);
    });
    setTimeout(function(){m.invalidateSize();},80);
  }
</script>
</body></html>
