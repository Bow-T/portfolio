<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex">
<title>Octopush · Web preview</title>
<style>
  :root{--green:#67b142;--green-d:#52963a;--ink:#1d1f22;--mut:#9aa0a6;--line:#ececec;--bg:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px;background:radial-gradient(120% 80% at 50% 0%,#2a2a2a,#0a0a0a);}
  .device{aspect-ratio:375/812;height:min(812px,94vh);width:auto;max-width:94vw;background:#000;border-radius:44px;padding:11px;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 2px #222;position:relative;}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);position:relative;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .status{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px 0 26px;font-size:13px;font-weight:600;flex:none;}
  .status .r{display:flex;gap:5px;}
  .scroll{flex:1;overflow:auto;padding:6px 18px 16px;}.scroll::-webkit-scrollbar{display:none;}
  h1{color:var(--green);font-size:28px;font-weight:900;margin:6px 0 16px;}
  .bar{display:flex;gap:10px;margin-bottom:18px;}
  .bar .test{flex:1;border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;font-weight:700;font-size:13.5px;color:#555;background:#fff;}
  .bar .ic{width:46px;height:46px;border:1px solid var(--line);border-radius:12px;display:grid;place-items:center;color:#777;flex:none;}
  .chat{display:flex;gap:13px;background:#f4f5f6;border-radius:16px;padding:14px;margin-bottom:12px;align-items:flex-start;}
  .ava{width:50px;height:50px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;}
  .cc{flex:1;min-width:0;} .cc .t{display:flex;justify-content:space-between;align-items:baseline;}
  .cc b{font-size:15px;} .cc .time{color:var(--mut);font-size:12px;}
  .cc p{color:#6b7177;font-size:13px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cc p.un{color:var(--ink);font-weight:600;}
  .end{text-align:center;color:var(--mut);font-size:12.5px;padding:14px;}
  .fab{position:absolute;right:18px;bottom:20px;width:56px;height:56px;border-radius:50%;background:var(--green);border:none;color:#fff;display:grid;place-items:center;box-shadow:0 10px 24px rgba(103,177,66,.45);cursor:pointer;}
</style><script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
<style>
html.embed,html.embed body{margin:0;padding:0;height:100%;background:#000;}
html.embed body{display:block;}
html.embed .device{width:100%;height:100vh;max-width:none;aspect-ratio:auto;border-radius:0;padding:0;background:transparent;box-shadow:none;}
html.embed .screen{border-radius:0;height:100vh;}
html.embed .notch{display:none;}
</style>
</head><body>
<div class="device"><div class="screen"><div class="notch"></div>
  <div class="status"></div>
  <div class="scroll">
    <h1>Chat par SMS</h1>
    <div class="bar"><div class="test">Testez sur N° partagé</div><div class="ic">⚙</div><div class="ic">⋯</div></div>
    <div id="list"></div>
    <div class="end">Plus aucun message</div>
  </div>
  <button class="fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
</div></div>
<script>
  const cs=[['LE','Leïla','#9bcf7e','Merci c\'est noté',0],['CA','Camille','#5b6b75','Parfait, rdv jeudi 15 à 16h.',1],['TH','Thomas','#9aa7b0','Wow, quelle étape importante !',1],['NI','Nicolas','#9bcf7e','Excellent! C\'est merveilleux de faire partie d\'un…',0],['QU','Quentin','#67b142','Célébrons cette réussite et continuons à avan…',0],['MA','Marie','#7d9bd6','À bientôt 👋',0]];
  document.getElementById('list').innerHTML=cs.map(c=>`<div class="chat"><div class="ava" style="background:${c[2]}">${c[0]}</div><div class="cc"><div class="t"><b>${c[1]}</b><span class="time">22/06/2023, 17:38</span></div><p class="${c[4]?'un':''}">${c[3]}</p></div></div>`).join('');
</script></body></html>
